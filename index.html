<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行购物计算器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F5F5F7;
    min-height: 100vh;
    padding: 16px;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(200, 146, 232, 0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(123, 93, 180, 0.12) 0%, transparent 50%);
  }

  .container { max-width: 480px; margin: 0 auto; }

  .card {
    background: #FFFFFF;
    border-radius: 24px;
    padding: 22px;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(120, 80, 180, 0.08), 0 1px 4px rgba(0,0,0,0.04);
  }

  .header { text-align: center; margin-bottom: 20px; }
  .header h1 {
    font-size: 22px;
    background: linear-gradient(135deg, #9B6FD4, #C892E8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .header p { font-size: 12px; color: #A090B8; }

  label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }

  select, input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #E8E0F0;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #FAFAFA;
  }
  select:focus, input:focus {
    border-color: #B094E0;
    box-shadow: 0 0 0 3px rgba(176, 148, 224, 0.15);
  }

  .form-group { margin-bottom: 16px; }

  .discount-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .discount-btn {
    flex: 1; min-width: 60px;
    padding: 12px 4px;
    border: 1.5px solid #E8E0F0;
    border-radius: 12px;
    background: #FAFAFA;
    font-size: 13px; cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
    color: #666;
  }
  .discount-btn.active {
    border-color: #B094E0;
    background: linear-gradient(135deg, #E8D8F8 0%, #D4B8EE 100%);
    color: #6B3FA0;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(176, 148, 224, 0.3);
  }

  .result-card {
    background: linear-gradient(135deg, #C892E8 0%, #9B6FD4 50%, #7B5DB4 100%);
    border-radius: 28px;
    padding: 26px;
    color: #fff;
    box-shadow: 0 8px 32px rgba(155, 111, 212, 0.3), 0 2px 8px rgba(0,0,0,0.08);
  }
  .result-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .result-row:last-child { margin-bottom: 0; margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.2); }
  .result-label { font-size: 13px; color: rgba(255,255,255,0.7); }
  .result-value { font-size: 15px; color: rgba(255,255,255,0.85); text-decoration: line-through; }
  .result-row:last-child .result-label { font-size: 15px; color: rgba(255,255,255,0.9); }
  .result-row:last-child .result-value { font-size: 26px; color: #A8F5C8; font-weight: 700; }

  .save-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #C892E8 0%, #9B6FD4 100%);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    box-shadow: 0 4px 16px rgba(155, 111, 212, 0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .save-btn:active {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(155, 111, 212, 0.3);
  }

  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .history-header h3 { font-size: 14px; color: #333; }
  .history-header span { font-size: 12px; color: #B094E0; cursor: pointer; }

  .history-item {
    background: #FAFAFA;
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .history-item:last-child { margin-bottom: 0; }
  .history-name { font-size: 14px; color: #333; font-weight: 500; }
  .history-meta { font-size: 11px; color: #999; margin-top: 2px; }
  .history-price { font-size: 16px; color: #7B5DB4; font-weight: 600; }

  .empty-state { text-align: center; padding: 24px; color: #C8B8E0; font-size: 13px; }

  .api-status { font-size: 12px; color: #B094E0; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">

  <div class="card">
    <div class="header">
      <h1>🧮 旅行购物计算器</h1>
      <p>退税后实付多少？一键算清</p>
    </div>

    <div class="form-group">
      <label>目的国家</label>
      <select id="country">
        <option value="fr">法国 🇫🇷（退12%）</option>
        <option value="it">意大利 🇮🇹（退12%）</option>
        <option value="de">德国 🇩🇪（退12%）</option>
        <option value="es">西班牙 🇪🇸（退12%）</option>
        <option value="nl">荷兰 🇳🇱（退12%）</option>
        <option value="be">比利时 🇧🇪（退12%）</option>
        <option value="at">奥地利 🇦🇹（退12%）</option>
        <option value="pt">葡萄牙 🇵🇹（退12%）</option>
        <option value="ie">爱尔兰 🇮🇪（退12%）</option>
        <option value="fi">芬兰 🇫🇮（退12%）</option>
        <option value="jp">日本 🇯🇵（退10%）</option>
        <option value="th">泰国 🇹🇭（退7%）</option>
        <option value="kr">韩国 🇰🇷（退10%）</option>
        <option value="au">澳大利亚 🇦🇺（退10%）</option>
        <option value="uk">英国 🇬🇧（退20%）</option>
        <option value="sg">新加坡 🇸🇬（退9%）</option>
        <option value="ch">瑞士 🇨🇭（退8%）</option>
        <option value="us">美国 🇺🇸（退0%）</option>
      </select>
    </div>

    <div class="form-group">
      <label>商品原价（外币）</label>
      <input type="number" id="price" placeholder="输入价格" value="1000">
    </div>

    <div class="form-group">
      <label>折扣</label>
      <div class="discount-btns">
        <div class="discount-btn active" onclick="setDiscount(0)">无折扣</div>
        <div class="discount-btn" onclick="setDiscount(10)">9折</div>
        <div class="discount-btn" onclick="setDiscount(20)">8折</div>
        <div class="discount-btn" onclick="setDiscount(30)">7折</div>
        <div class="discount-btn" onclick="setDiscount(15)">85折</div>
      </div>
    </div>

    <div class="result-card">
      <div class="result-row">
        <span class="result-label">原价</span>
        <span class="result-value" id="originalPrice">€1,000</span>
      </div>
      <div class="result-row" id="discountRow" style="display:none;">
        <span class="result-label">折后价</span>
        <span class="result-value" id="discountedPrice">¥800</span>
      </div>
      <div class="result-row">
        <span class="result-label">退税后实付</span>
        <span class="result-value" id="finalPrice">¥7,040</span>
      </div>
    </div>

    <button class="save-btn" onclick="saveRecord()">💾 保存到历史</button>
    <p class="api-status" id="rateStatus">汇率获取中...</p>
  </div>

  <div class="card">
    <div class="history-header">
      <h3>📋 计算历史</h3>
      <span onclick="clearHistory()">清除全部</span>
    </div>
    <div id="historyList">
      <div class="empty-state">暂无计算记录<br>开始算一笔吧～</div>
    </div>
  </div>

</div>

<script>
const EXCHANGE_API_URL = 'https://open.er-api.com/v6/latest/USD';
const EXCHANGE_CACHE_KEY = 'exchangeRatesCacheV2';
const EXCHANGE_CACHE_TTL = 60 * 60 * 1000;
const TAX_RATES = {
  fr: 0.12, it: 0.12, de: 0.12, es: 0.12, nl: 0.12, be: 0.12, at: 0.12, pt: 0.12, ie: 0.12, fi: 0.12,
  jp: 0.10, kr: 0.10, th: 0.07, au: 0.10, uk: 0.20, sg: 0.09, ch: 0.08, us: 0.00
};
const CURRENCY_SYMBOL = {
  fr: '€', it: '€', de: '€', es: '€', nl: '€', be: '€', at: '€', pt: '€', ie: '€', fi: '€',
  jp: '¥', th: '฿', kr: '₩', au: 'A$', uk: '£', sg: 'S$', ch: 'CHF', us: '$'
};
const CURRENCY_NAME = {
  fr: 'EUR', it: 'EUR', de: 'EUR', es: 'EUR', nl: 'EUR', be: 'EUR', at: 'EUR', pt: 'EUR', ie: 'EUR', fi: 'EUR',
  jp: 'JPY', th: 'THB', kr: 'KRW', au: 'AUD', uk: 'GBP', sg: 'SGD', ch: 'CHF', us: 'USD'
};

let currentDiscount = 0;
let currentCountry = 'fr';
let exchangeRates = {};
let rateUpdatedAt = '';

function setDiscount(val) {
  currentDiscount = val;
  document.querySelectorAll('.discount-btn').forEach((btn, i) => {
    btn.classList.toggle('active', parseInt(btn.getAttribute('onclick').match(/\d+/)[0]) === val);
  });
  calculate();
}

function formatNum(num) {
  if (num >= 10000) return (num / 10000).toFixed(1) + '万';
  return num.toLocaleString('zh-CN', { maximumFractionDigits: 2 });
}

function calculate() {
  const price = parseFloat(document.getElementById('price').value) || 0;
  const currencyCode = CURRENCY_NAME[currentCountry];
  const rate = exchangeRates[currencyCode] || 0;
  const taxRate = TAX_RATES[currentCountry];
  const symbol = CURRENCY_SYMBOL[currentCountry];

  const discounted = price * (1 - currentDiscount / 100);
  const afterTax = discounted * (1 - taxRate);
  const finalCny = afterTax * rate;

  const originalFormatted = `${symbol}${(price).toFixed(2)}`;
  const discountedFormatted = `${symbol}${(discounted).toFixed(2)}`;

  document.getElementById('originalPrice').textContent = originalFormatted;
  document.getElementById('discountedPrice').textContent = discountedFormatted;
  document.getElementById('discountRow').style.display = currentDiscount > 0 ? 'flex' : 'none';
  document.getElementById('finalPrice').textContent = `¥${formatNum(Math.round(finalCny))}`;
}

function getExchangeRates() {
  const cached = localStorage.getItem(EXCHANGE_CACHE_KEY + '_' + currentCountry);
  if (cached) {
    const { rates, updatedAt } = JSON.parse(cached);
    exchangeRates = rates;
    rateUpdatedAt = updatedAt;
    updateRateStatus();
    calculate();
  }

  fetch(`${EXCHANGE_API_URL}`)
    .then(r => r.json())
    .then(data => {
      if (data.result === 'success') {
        exchangeRates = normalizeRates(data.rates);
        const now = new Date();
        rateUpdatedAt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        localStorage.setItem(EXCHANGE_CACHE_KEY + '_' + currentCountry, JSON.stringify({ rates: exchangeRates, updatedAt: rateUpdatedAt }));
        updateRateStatus();
        calculate();
      }
    })
    .catch(err => {
      console.error('汇率获取失败', err);
      rateUpdatedAt = '获取失败，使用缓存';
      updateRateStatus();
      if (Object.keys(exchangeRates).length > 0) calculate();
    });
}

function normalizeRates(apiRates) {
  const cnyPerUsd = apiRates.CNY;
  const supportedCurrencies = [...new Set(Object.values(CURRENCY_NAME))];
  return supportedCurrencies.reduce((result, code) => {
    if (apiRates[code] && cnyPerUsd) {
      result[code] = cnyPerUsd / apiRates[code];
    }
    return result;
  }, {});
}

function updateRateStatus() {
  const statusEl = document.getElementById('rateStatus');
  statusEl.textContent = rateUpdatedAt ? `实时汇率更新时间：${rateUpdatedAt}` : '汇率获取中...';
}

function saveRecord() {
  const price = parseFloat(document.getElementById('price').value) || 0;
  const countryEl = document.getElementById('country');
  const countryName = countryEl.options[countryEl.selectedIndex].text;
  const finalPrice = document.getElementById('finalPrice').textContent;
  const currencyCode = CURRENCY_NAME[currentCountry];
  const rate = exchangeRates[currencyCode] || 0;
  const taxRate = TAX_RATES[currentCountry];
  const discounted = price * (1 - currentDiscount / 100);
  const afterTax = discounted * (1 - taxRate);

  const record = {
    id: Date.now(),
    country: currentCountry,
    countryName: countryName,
    price: price,
    discount: currentDiscount,
    taxRate: taxRate,
    exchangeRate: rate,
    finalCny: afterTax * rate,
    finalPriceText: finalPrice,
    time: new Date().toLocaleString('zh-CN')
  };

  let history = JSON.parse(localStorage.getItem('calcHistory') || '[]');
  history.unshift(record);
  if (history.length > 50) history = history.slice(0, 50);
  localStorage.setItem('calcHistory', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const history = JSON.parse(localStorage.getItem('calcHistory') || '[]');
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-state">暂无计算记录<br>开始算一笔吧～</div>';
    return;
  }
  list.innerHTML = history.map(item => `
    <div class="history-item">
      <div>
        <div class="history-name">${item.countryName}</div>
        <div class="history-meta">${item.price} × ${item.discount > 0 ? item.discount + '折' : '无折扣'} · ${item.time}</div>
      </div>
      <div class="history-price">${item.finalPriceText}</div>
    </div>
  `).join('');
}

function clearHistory() {
  localStorage.removeItem('calcHistory');
  renderHistory();
}

document.getElementById('country').addEventListener('change', function() {
  currentCountry = this.value;
  getExchangeRates();
});

document.getElementById('price').addEventListener('input', calculate);

getExchangeRates();
renderHistory();
</script>
</body>
</html>
